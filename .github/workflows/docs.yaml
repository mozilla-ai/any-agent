name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/generate_api_docs.py'
      - 'scripts/generate_cookbooks.py'
      - 'scripts/generate_framework_table.py'
      - 'scripts/generate_llms_txt.py'
      - 'scripts/convert_to_gitbook.py'
      - '.github/workflows/docs.yaml'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/generate_api_docs.py'
      - 'scripts/generate_cookbooks.py'
      - 'scripts/generate_framework_table.py'
      - 'scripts/generate_llms_txt.py'
      - 'scripts/convert_to_gitbook.py'
      - '.github/workflows/docs.yaml'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  docs:
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install the latest version of uv and set the python version to 3.13
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13
          activate-environment: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Python dependencies
        run: uv sync --group docs --extra all

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Generate framework table
        run: uv run python scripts/generate_framework_table.py

      - name: Generate API docs
        run: uv run python scripts/generate_api_docs.py

      - name: Generate cookbook pages
        run: uv run python scripts/generate_cookbooks.py

      - name: Build docs
        working-directory: docs
        run: npm run build
        env:
          CI: true

      - name: Generate llms.txt
        run: uv run python scripts/generate_llms_txt.py

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist

      - name: Build GitBook site
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        run: uv run python scripts/convert_to_gitbook.py

      - name: Deploy to gitbook-docs branch
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          cp .gitbook-branch-readme.md site/README-BRANCH.md

          git fetch origin gitbook-docs || true
          if git rev-parse --verify origin/gitbook-docs >/dev/null 2>&1; then
            git checkout gitbook-docs
          else
            git checkout --orphan gitbook-docs
            git rm -rf .
          fi

          cp -r /tmp/gitbook-site/* . 2>/dev/null || rsync -a --delete site/ .
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "docs: update GitBook documentation from ${{ github.sha }}"
            git push origin gitbook-docs
          fi
